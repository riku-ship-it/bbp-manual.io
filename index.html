<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BBP 操作手冊</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; line-height: 1.6; }
        h1 { color: #c0392b; border-bottom: 2px solid #c0392b; }
        .section { background: white; border: 1px solid #ddd; margin-bottom: 10px; padding: 15px; border-radius: 5px; }
        .btn { background: #27ae60; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        @media print { .btn { display: none; } }
    </style>
</head>
<body>
    <h1>BBP 血源性病原體操作手冊</h1>
    <button class="btn" onclick="window.print()">🖨️ 點擊列印紙本</button>
    <div class="section">
        <h3>第一章：緊急處理</h3>
        <p>若發生針扎，請立即用肥皂水沖洗傷口並通報主管。</p>
    </div>
    <div class="section">
        <h3>第二章：防護裝備</h3>
        <p>接觸血液時必須穿戴手套、口罩及護目鏡。</p>
    </div>
</body>
</html>
